name: Release

# Cut a release by pushing a semver tag: `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags:
      - "v*"

# Least privilege by default; the release job grants itself what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload archives/checksums/SBOMs
      id-token: write # OIDC token for cosign keyless signing (Sigstore/Fulcio)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for the changelog

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      # syft generates the per-archive SBOMs declared in .goreleaser.yaml.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          # Pinned patch line for reproducible releases (same policy as
          # authhound/probe); bump deliberately and re-run `goreleaser check`.
          version: "~> v2.17.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
